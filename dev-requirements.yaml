channels:
  - conda-forge
  - pyg
dependencies:
  - python=3.12
  - pytorch-gpu>=2.8
  - torchvision
  - spikingjelly
  - pytorch_sparse
  - pip
  - pip:
    # Forked omegaconf for enhanced features (required for omegaconf-config skill)
    - git+https://github.com/alexfanqi/omegaconf.git
    # profiling
    - tensorboard_plugin_profile
    # dynamic tools
    - nolds
    - powerlaw
  - tqdm
  - matplotlib
  - scipy
  - xarray
  - h5py
  - hdf5plugin
  - pandas >= 2 # assume CoW
  - numba
  - seaborn
  # dev
  - ipykernel
  # tensorboard
  - tensorboard
  - etils
  # lint and type checking
  - pre-commit
  - ruff
  - docformatter
  - jaxtyping
  - beartype
  - mypy
