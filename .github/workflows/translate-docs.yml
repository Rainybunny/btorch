name: Translate docs

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'docs/en/**'

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.8.0 --extra-index-url https://download.pytorch.org/whl/cpu
          python -m pip install torch_sparse torch_scatter -f https://data.pyg.org/whl/torch-2.8.0+cpu.html
          python -m pip install git+https://github.com/alexfanqi/omegaconf.git
          python -m pip install -e .[docs]

      - name: Update and add translations
        run: python scripts/translate.py update-and-add --language zh --max-pages 20
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}

      - name: Remove obsolete translations
        run: python scripts/translate.py remove-removable --language zh

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/zh/
          if git diff --staged --quiet; then
            echo "No translation changes"
          else
            git commit -m "docs: update zh translations"
            git push origin ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          fi
