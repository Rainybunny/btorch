name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      confirm:
        description: "Set to true to run CI"
        type: boolean
        required: true

permissions:
  contents: read

jobs:
  build-test:
    # Push: always run.
    # PR: auto-run unless the author is new (first-timer/none); new authors require the `run-ci` label.
    # Manual dispatch: requires confirm=true.
    if: >-
      ${{
        github.event_name == 'push' ||
        (
          github.event_name == 'pull_request' &&
          (
            !contains(fromJson('["FIRST_TIMER","FIRST_TIME_CONTRIBUTOR","NONE"]'), github.event.pull_request.author_association)
            || contains(github.event.pull_request.labels.*.name, 'run-ci')
          )
        ) ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'true')
      }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU wheels for torch
          python -m pip install torch --extra-index-url https://download.pytorch.org/whl/cpu
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Lint
        run: ruff check .
        continue-on-error: true

      - name: Tests (CPU)
        run: pytest tests/models

      - name: Build docs
        run: mkdocs build --strict
