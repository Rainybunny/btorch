name: Build docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.8.0 --extra-index-url https://download.pytorch.org/whl/cpu
          python -m pip install torch_sparse torch_scatter -f https://data.pyg.org/whl/torch-2.8.0+cpu.html
          python -m pip install git+https://github.com/alexfanqi/omegaconf.git
          python -m pip install -e .[docs]

      - name: Build all languages
        run: python scripts/docs.py build-all

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
