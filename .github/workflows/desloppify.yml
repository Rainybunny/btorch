name: Desloppify Quality Check

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  desloppify-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install desloppify
        run: uv pip install "desloppify[full]" --system

      - name: Get base branch scan
        id: base
        run: |
          git fetch origin ${{ github.base_ref }}
          git checkout origin/${{ github.base_ref }}
          base_output=$(desloppify scan --profile ci 2>&1 || true)
          base_score=$(echo "$base_output" | grep -oP 'Scores:.*overall\s+\K[0-9.]+' || echo "")
          echo "score=$base_score" >> $GITHUB_OUTPUT
          # Store output for potential use
          echo "$base_output" > /tmp/base_scan.txt
          git checkout -

      - name: Get PR branch scan
        id: pr
        run: |
          pr_output=$(desloppify scan --profile ci 2>&1 || true)
          pr_score=$(echo "$pr_output" | grep -oP 'Scores:.*overall\s+\K[0-9.]+' || echo "")
          echo "score=$pr_score" >> $GITHUB_OUTPUT
          # Store full output
          echo "$pr_output" > /tmp/pr_scan.txt

      - name: Comment PR with desloppify results
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const baseScore = `${{ steps.base.outputs.score }}`;
            const prScore = `${{ steps.pr.outputs.score }}`;
            const prOutput = fs.readFileSync('/tmp/pr_scan.txt', 'utf8');

            let body = '## Desloppify Quality\n\n';

            if (prScore) {
              body += `**Score:** ${prScore}/100`;

              if (baseScore) {
                const diff = (parseFloat(prScore) - parseFloat(baseScore)).toFixed(2);
                const sign = diff > 0 ? '+' : '';
                const emoji = diff > 0 ? '📈' : diff < 0 ? '📉' : '➡️';
                body += ` (${emoji} ${sign}${diff} vs base)`;
              }

              body += '\n\n';
            }

            body += '<details>\n<summary>Full report</summary>\n\n';
            body += '```\n';
            body += prOutput;
            body += '\n```\n';
            body += '</details>\n';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Desloppify Quality')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
